version: 2
updates:
  # JavaScript toolchain. The core package ships zero runtime dependencies, so
  # these are almost entirely devDependencies (Vite, Vitest, Biome, TypeScript,
  # ESLint, TypeDoc, ...) plus the optional @aws-sdk/client-s3 peer. Dependabot
  # updates the pnpm lockfile in place.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      # Roll routine minor + patch dev-dependency bumps into a single weekly PR
      # to cut review noise. Majors are excluded from the group below and land
      # as individual PRs so breaking toolchain changes (e.g. Vite 6 -> 7,
      # Biome 1 -> 2, ESLint 10 -> 11) get reviewed in isolation.
      dev-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI, docs, examples, integration, and release
  # workflows (actions/checkout, setup-node, pnpm/action-setup, deploy-pages,
  # setup-bun, setup-deno, ...).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - '*'
