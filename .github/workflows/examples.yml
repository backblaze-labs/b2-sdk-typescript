name: Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Every job in this workflow checks the same example sources directly against
# `src/` (no build step). This is only possible because the SDK is
# source-isomorphic: every internal import uses `.ts` extensions, and
# `allowImportingTsExtensions` is on in tsconfig.json. If a job below ever has
# to be preceded by `pnpm build`, that means we accidentally broke source
# isomorphism somewhere.

jobs:
  typecheck-node:
    name: Typecheck (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck examples against src/
        run: pnpm typecheck:examples

  typecheck-bun:
    name: Typecheck (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      # Bun ships its own JS/TS runtime but we invoke `tsc` (from the pinned
      # devDep) so failures are apples-to-apples with the Node typecheck job.
      - name: Typecheck examples against src/ (Bun-hosted tsc)
        run: bunx --bun tsc --noEmit -p examples/tsconfig.json

  smoke-examples:
    name: Smoke-run examples (B2Simulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Examples import `@backblaze-labs/b2-sdk` which resolves via package.json's
      # `exports` map to `./dist/index.js`. Build dist/ so tsx can resolve
      # those imports the same way an end user would after `npm install`.
      # (The typecheck jobs above don't need this because tsc honours
      # `paths` to map the bare specifier straight at ../src/*.ts.)
      - run: pnpm build
      - name: Prepare smoke fixtures
        run: |
          mkdir -p /tmp/smoke-data
          echo "alpha file" > /tmp/smoke-data/a.txt
          echo "beta file"  > /tmp/smoke-data/b.txt
          mkdir -p /tmp/smoke-data/subdir
          echo "nested"    > /tmp/smoke-data/subdir/c.txt
      # Each example is executed against an in-memory B2Simulator (via
      # `examples/_smoke/transport.ts`). No network, no credentials, no cost.
      # The simulator is fresh per example process; pre-seeded with the
      # `smoke-test` bucket containing `smoke-test.txt`.
      - name: examples/node-list-buckets.ts
        env:
          B2_USE_SIMULATOR: '1'
          B2_APPLICATION_KEY_ID: smoke-id
          B2_APPLICATION_KEY: smoke-key
        run: npx tsx examples/node-list-buckets.ts
      - name: examples/node-upload.ts
        env:
          B2_USE_SIMULATOR: '1'
          B2_APPLICATION_KEY_ID: smoke-id
          B2_APPLICATION_KEY: smoke-key
        run: npx tsx examples/node-upload.ts smoke-test /tmp/smoke-data/a.txt
      - name: examples/node-download.ts
        env:
          B2_USE_SIMULATOR: '1'
          B2_APPLICATION_KEY_ID: smoke-id
          B2_APPLICATION_KEY: smoke-key
        run: npx tsx examples/node-download.ts smoke-test smoke-test.txt /tmp/restored.txt
      - name: examples/node-backup-cli (snapshot)
        env:
          B2_USE_SIMULATOR: '1'
          B2_APPLICATION_KEY_ID: smoke-id
          B2_APPLICATION_KEY: smoke-key
          B2_BACKUP_PASSPHRASE: smoke-pass
        run: npx tsx examples/node-backup-cli/backup.ts snapshot /tmp/smoke-data b2://smoke-test/backups
      - name: Verify the downloaded file matches what the simulator served
        run: |
          diff /tmp/restored.txt <(printf 'hello smoke\n')

  typecheck-deno:
    name: Typecheck (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      # `deno check` uses Deno's own TS toolchain. The import map in
      # examples/deno.json points the bare specifiers (@backblaze-labs/b2-sdk, ...)
      # straight at the SDK source under ../src/*.ts. No build, no
      # node_modules, no npm: specifier dance.
      - name: Typecheck examples with Deno (no build, source only)
        working-directory: examples
        run: |
          deno check \
            node-list-buckets.ts \
            node-upload.ts \
            node-download.ts \
            node-sync-cli.ts \
            node-with-progress.ts \
            node-backup-cli/backup.ts \
            node-backup-cli/crypto.ts \
            node-backup-cli/manifest.ts \
            node-backup-cli/worker.ts \
            node-plugin-template/index.ts \
            node-plugin-template/storage.ts
