name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:docs
      - run: pnpm typecheck
      - run: pnpm run docs

  test-node:
    name: Test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full Node matrix (cheap runner minutes, baseline coverage).
          - { os: ubuntu-latest, node-version: 22 }
          - { os: ubuntu-latest, node-version: 24 }
          # Windows: catches path-separator and NTFS-specific issues
          # (LocalFolder normalises `\` to `/`, file.node.test.ts uses tmpdir).
          # Tested on the same Node versions as Linux. Windows runner minutes
          # are billed at 2x on public repos.
          - { os: windows-latest, node-version: 22 }
          - { os: windows-latest, node-version: 24 }
          # macOS: catches APFS / Darwin fs quirks (case-insensitive lookups,
          # .DS_Store side effects, hfs+/apfs mtime precision). macOS runner
          # minutes are billed at 10x on public repos.
          - { os: macos-latest, node-version: 22 }
          - { os: macos-latest, node-version: 24 }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: bun test src/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        # Vite/Vitest's `coverage.thresholds` config fails the run when any
        # metric drops below the configured floor (see vite.config.ts).
        run: pnpm test:coverage
      - name: Publish coverage summary to the job log
        if: always()
        run: |
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct.toFixed(2).padStart(6)}%  (\${m.covered}/\${m.total})\`;
              console.log('statements:', fmt(s.statements));
              console.log('branches:  ', fmt(s.branches));
              console.log('functions: ', fmt(s.functions));
              console.log('lines:     ', fmt(s.lines));
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo '(coverage-summary.json not found)' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  test-browser:
    name: Test (Browser - ${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm test:browser
        env:
          # Limit the matrix shard to just this engine.
          VITEST_BROWSER_INSTANCE: ${{ matrix.browser }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check output exists
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/raw/index.js
          test -f dist/errors/index.js
          test -f dist/simulator/index.js

  # Real-B2 integration tests live in their own workflow (integration.yml),
  # which runs the Node 22 + 24 matrix sequentially + the real-examples
  # follow-up + a weekly schedule + workflow_dispatch. Having a duplicate
  # `pnpm test:integration` job here would race that workflow for the same
  # `sdk-test-*` buckets on every push to main, because GitHub Actions
  # `concurrency:` groups do not span workflows.
