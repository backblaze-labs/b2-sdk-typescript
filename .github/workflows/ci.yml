name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:docs
      - run: pnpm lint:spelling
      - run: pnpm typecheck
      - run: pnpm run docs
      # Cross-file metadata consistency check: package name, version, tarball
      # name in RELEASE.md, README h1 + install snippets, CHANGELOG entry.
      # Cheap (<100 ms) and catches the kind of drift only a human review would.
      - run: pnpm run verify:metadata
      # Release workflow trust-boundary checks: artifact build isolation,
      # pinned package-type analysis, npm integrity comparison, and gh repo context.
      - run: pnpm run verify:release

  test-fast:
    name: Test fast (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full Node matrix (cheap runner minutes, baseline coverage).
          - { os: ubuntu-latest, node-version: 22.18.0 }
          - { os: ubuntu-latest, node-version: 24 }
          # Windows: catches path-separator and NTFS-specific issues
          # (LocalFolder normalises `\` to `/`, file.node.test.ts uses tmpdir).
          # Tested on the same Node versions as Linux. Windows runner minutes
          # are billed at 2x on public repos.
          - { os: windows-latest, node-version: 22.18.0 }
          - { os: windows-latest, node-version: 24 }
          # macOS: catches APFS / Darwin fs quirks (case-insensitive lookups,
          # .DS_Store side effects, hfs+/apfs mtime precision). macOS runner
          # minutes are billed at 10x on public repos.
          - { os: macos-latest, node-version: 22.18.0 }
          - { os: macos-latest, node-version: 24 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fast tier: every `*.test.ts` except `*.slow.test.ts`. Wall clock is
      # <2 s locally and <30 s on the slowest CI runner — this is the job
      # that gates PR feedback. Heavy multipart tests live in `*.slow.test.ts`
      # and run in the `test-slow` job below.
      - run: pnpm test

  test-slow:
    name: Test slow (multipart)
    # Slow tier is CPU/wall-clock-bound, not OS-specific. Multipart tests
    # exercise the simulator's SHA-1 path which behaves identically across
    # Linux/macOS/Windows. Run on Linux only (cheapest runner minutes) and
    # only the current LTS Node — we cover OS + Node matrix surface in
    # `test-fast` already.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # vitest.slow.config.ts pins maxForks: 1 (no CPU contention between
      # heavy SHA-1 tests) and testTimeout: 180_000. Bump per-worker heap
      # so the multi-MB buffers fit with room to spare.
      - run: pnpm test:slow
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      # Bun runs every `*.test.ts` (including `*.slow.test.ts`). The slow
      # multipart tests need a generous timeout — Bun's default 5 s isn't
      # enough for the simulator's per-part SHA-1 of 5 MB+ buffers.
      - run: bun test --timeout 180000 src/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        # `pnpm test:coverage` uses vitest.coverage.config.ts, which runs the
        # union of fast + slow tiers (the only config that covers the full
        # codebase) with the slow tier's `maxForks: 1` and `testTimeout`.
        # Coverage thresholds gate the job.
        run: pnpm test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Publish coverage summary to the job log
        if: always()
        run: |
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => \`\${m.pct.toFixed(2).padStart(6)}%  (\${m.covered}/\${m.total})\`;
              console.log('statements:', fmt(s.statements));
              console.log('branches:  ', fmt(s.branches));
              console.log('functions: ', fmt(s.functions));
              console.log('lines:     ', fmt(s.lines));
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo '(coverage-summary.json not found)' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  test-browser:
    name: Test (Browser - ${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browser
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: pnpm exec playwright install --with-deps "$PLAYWRIGHT_BROWSER"
      - run: pnpm test:browser
        env:
          # Limit the matrix shard to just this engine.
          VITEST_BROWSER_INSTANCE: ${{ matrix.browser }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check output exists
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts
          test -f dist/raw/index.js
          test -f dist/errors/index.js
          test -f dist/simulator/index.js
      # Regression test for the dual-format ESM + CJS resolution path. Packs
      # the SDK, installs the tarball into an ephemeral consumer project, and
      # confirms both `import` and `require` work. Catches missing `.d.cts`
      # mirror files (the failure mode that broke type resolution for CJS
      # consumers in early 0.1.0 builds), exports-map typos, and rollup
      # `external` regressions that would land a `Cannot find module` in
      # downstream node_modules.
      - run: pnpm run verify:exports

  # Real-B2 integration tests live in their own workflow (integration.yml),
  # which runs the Node 22.18 + 24 matrix sequentially + the real-examples
  # follow-up + a weekly schedule + workflow_dispatch. Having a duplicate
  # `pnpm test:integration` job here would race that workflow for the same
  # `sdk-test-*` buckets on every push to main, because GitHub Actions
  # `concurrency:` groups do not span workflows.
